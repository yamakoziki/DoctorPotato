<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>じゃがいもマスター 農家技術評価</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Antique+Soft&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #1a1008;
  --soil-dark: #3d2008;
  --soil: #6b3a1f;
  --soil-mid: #9c5a2e;
  --earth: #c8843e;
  --gold: #d4a843;
  --straw: #e8d4a0;
  --cream: #faf6ec;
  --paper: #f4ede0;
  --green-dark: #1e4a18;
  --green: #2e6b25;
  --green-light: #5a9e48;
  --leaf: #8cc05a;
  --sky-top: #4a7fb5;
  --sky-mid: #7aa8cc;
  --snow: #e8f0f8;
  --mtn1: #8fa5be;
  --mtn2: #b8ccd8;
  --mtn3: #d0dde8;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { scroll-behavior: smooth; }

body {
  font-family: 'Noto Sans JP', sans-serif;
  background: var(--cream);
  color: var(--ink);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ======== SCREENS ======== */
.screen { display: none; min-height: 100vh; }
.screen.active { display: block; }

/* ======== HIMALAYA HEADER ======== */
.himalaya {
  position: relative;
  width: 100%;
  height: 200px;
  background: linear-gradient(180deg, #2b5496 0%, #4a7fb5 35%, #7aa8cc 65%, #c8b898 100%);
  overflow: hidden;
  flex-shrink: 0;
}
.himalaya-snow {
  position: absolute; bottom: 40px; left: -5%; right: -5%;
  height: 110px;
  background: #e8f0f8;
  clip-path: polygon(0% 100%, 5% 45%, 13% 65%, 22% 18%, 31% 52%, 40% 8%, 50% 42%, 58% 12%, 66% 48%, 74% 22%, 82% 55%, 90% 28%, 95% 58%, 100% 38%, 100% 100%);
}
.himalaya-rock {
  position: absolute; bottom: 0; left: -5%; right: -5%;
  height: 80px;
  background: var(--mtn1);
  clip-path: polygon(0% 100%, 7% 55%, 16% 72%, 27% 30%, 38% 62%, 49% 20%, 60% 55%, 70% 32%, 80% 60%, 90% 38%, 100% 65%, 100% 100%);
}
.himalaya-field {
  position: absolute; bottom: 0; left: 0; right: 0;
  height: 35px;
  background: linear-gradient(180deg, var(--green-dark) 0%, #2a5c22 100%);
}
.himalaya-title {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding-bottom: 20px;
}
.himalaya-title .app-icon {
  font-size: 44px;
  filter: drop-shadow(0 3px 8px rgba(0,0,0,0.3));
  animation: bob 3.5s ease-in-out infinite;
}
@keyframes bob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-7px)} }
.himalaya-title h1 {
  font-family: 'Zen Antique Soft', serif;
  font-size: 20px;
  color: white;
  text-shadow: 0 2px 8px rgba(0,0,0,0.4);
  margin-top: 6px;
  letter-spacing: 1px;
}
.himalaya-title p {
  font-size: 11px;
  color: rgba(255,255,255,0.8);
  margin-top: 3px;
  letter-spacing: 2px;
}

/* ======== CARDS ======== */
.card {
  background: white;
  border-radius: 18px;
  margin: 14px 14px 0;
  padding: 20px;
  box-shadow: 0 3px 16px rgba(107,58,31,0.1), 0 1px 4px rgba(0,0,0,0.05);
  border: 1px solid rgba(200,132,62,0.12);
}
.card-head {
  font-family: 'Zen Antique Soft', serif;
  font-size: 15px;
  color: var(--soil);
  margin-bottom: 14px;
  display: flex; align-items: center; gap: 8px;
}

/* ======== EMAIL INPUT ======== */
.field-label {
  font-size: 12px; font-weight: 500;
  color: var(--soil-mid); margin-bottom: 7px; display: block;
  letter-spacing: 0.5px;
}
.text-input {
  width: 100%; padding: 13px 15px;
  border: 2px solid var(--straw);
  border-radius: 12px;
  font-size: 15px; font-family: inherit;
  background: var(--paper); color: var(--ink);
  outline: none; transition: all 0.2s;
}
.text-input:focus { border-color: var(--earth); background: white; box-shadow: 0 0 0 4px rgba(200,132,62,0.1); }

/* ======== EVALUATOR INFO ======== */
.evaluator-row {
  display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px;
}
.evaluator-row.full { grid-template-columns: 1fr; }

/* ======== CATEGORY SELECTOR ======== */
.cat-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 9px;
}
.cat-card {
  padding: 12px 10px;
  background: var(--paper);
  border-radius: 12px;
  border: 2px solid transparent;
  cursor: pointer; text-align: center;
  transition: all 0.2s; user-select: none;
}
.cat-card.on { background: #fff8ed; border-color: var(--earth); }
.cat-card:active { transform: scale(0.96); }
.cat-card .c-icon { font-size: 26px; display: block; margin-bottom: 5px; }
.cat-card .c-name { font-size: 12px; font-weight: 500; color: var(--ink); line-height: 1.3; }
.cat-card .c-sub { font-size: 10px; color: var(--soil-mid); margin-top: 2px; opacity: 0.8; }
.cat-card .c-chk {
  width: 18px; height: 18px; border-radius: 50%;
  border: 2px solid #ccc; background: white;
  margin: 6px auto 0; transition: all 0.2s;
}
.cat-card.on .c-chk { background: var(--green); border-color: var(--green); }

/* ======== START BTN ======== */
.btn-start {
  display: block; width: calc(100% - 28px);
  margin: 16px 14px 24px;
  padding: 18px; border: none; border-radius: 16px;
  background: linear-gradient(135deg, var(--green-dark), var(--green));
  color: white; font-size: 17px;
  font-family: 'Zen Antique Soft', serif;
  letter-spacing: 2px; cursor: pointer;
  box-shadow: 0 8px 24px rgba(30,74,24,0.35);
  transition: transform 0.15s, box-shadow 0.15s;
}
.btn-start:active { transform: scale(0.97); box-shadow: 0 4px 12px rgba(30,74,24,0.3); }

/* ======== QUESTION SCREEN ======== */
.q-hero {
  background: linear-gradient(160deg, var(--soil-dark) 0%, var(--soil) 60%, var(--soil-mid) 100%);
  padding: 60px 18px 26px;
  position: relative; overflow: hidden;
}
.q-hero::after {
  content: '';
  position: absolute; bottom: -16px; left: -5%; right: -5%;
  height: 32px; background: var(--cream);
  border-radius: 50%; z-index: 2;
}
.q-meta {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 14px; position: relative; z-index: 1;
}
.q-badge {
  display: inline-flex; align-items: center; gap: 5px;
  background: rgba(255,255,255,0.18); backdrop-filter: blur(6px);
  color: white; font-size: 12px; padding: 5px 12px; border-radius: 20px;
}
.q-counter {
  font-size: 12px; color: rgba(255,255,255,0.7);
}
.q-progress {
  height: 4px; background: rgba(255,255,255,0.2); border-radius: 2px;
  margin-bottom: 18px; overflow: hidden; position: relative; z-index: 1;
}
.q-progress-fill {
  height: 100%; background: var(--gold);
  border-radius: 2px; transition: width 0.5s ease;
}
.q-text {
  font-family: 'Zen Antique Soft', serif;
  font-size: 18px; line-height: 1.65;
  color: white; position: relative; z-index: 1;
  text-shadow: 0 1px 4px rgba(0,0,0,0.2);
}
.q-difficulty {
  display: inline-block;
  font-size: 10px; color: var(--gold);
  letter-spacing: 1px; margin-bottom: 10px;
  position: relative; z-index: 1;
}

/* ======== OPTIONS ======== */
.options-wrap { padding: 28px 14px 10px; }
.opt-btn {
  display: flex; align-items: center; gap: 13px;
  width: 100%; padding: 15px 16px; margin-bottom: 10px;
  background: white; border: 2px solid #eee6d8;
  border-radius: 14px; cursor: pointer;
  font-family: 'Noto Sans JP', sans-serif; font-size: 14px;
  color: var(--ink); text-align: left; line-height: 1.5;
  box-shadow: 0 2px 8px rgba(0,0,0,0.04);
  transition: all 0.18s;
}
.opt-btn:active { transform: scale(0.98); }
.opt-btn.chosen { border-color: var(--earth); background: #fff8ee; }
.opt-btn.correct-ans { border-color: var(--green); background: #eef7eb; }
.opt-btn.wrong-ans { border-color: #d95050; background: #fff0f0; }
.opt-lbl {
  min-width: 30px; height: 30px; border-radius: 50%;
  background: var(--paper); display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700; color: var(--soil);
  transition: all 0.18s; flex-shrink: 0;
}
.opt-btn.chosen .opt-lbl { background: var(--earth); color: white; }
.opt-btn.correct-ans .opt-lbl { background: var(--green); color: white; }
.opt-btn.wrong-ans .opt-lbl { background: #d95050; color: white; }

/* ======== FEEDBACK ======== */
.feedback-box {
  margin: 0 14px 12px;
  padding: 14px 16px;
  border-radius: 14px;
  font-size: 13px; line-height: 1.75;
  border-left: 4px solid;
  animation: fadein 0.3s ease;
}
@keyframes fadein { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
.feedback-box.ok { background: #eef7eb; border-color: var(--green); color: #1a4016; }
.feedback-box.ng { background: #fff0f0; border-color: #d95050; color: #5c1010; }
.feedback-title { font-weight: 700; margin-bottom: 4px; font-size: 14px; }
.btn-next {
  display: block; width: calc(100% - 28px);
  margin: 0 14px 20px; padding: 16px;
  background: linear-gradient(135deg, var(--green-dark), var(--green));
  color: white; border: none; border-radius: 14px;
  font-size: 15px; font-family: 'Noto Sans JP', sans-serif; font-weight: 500;
  cursor: pointer; letter-spacing: 1px;
  box-shadow: 0 6px 18px rgba(30,74,24,0.3);
  transition: transform 0.15s;
}
.btn-next:active { transform: scale(0.97); }
.back-btn {
  position: fixed; top: 14px; left: 14px; z-index: 100;
  background: rgba(255,255,255,0.2); backdrop-filter: blur(8px);
  border: none; color: white; font-size: 13px;
  padding: 8px 14px; border-radius: 20px; cursor: pointer;
  font-family: 'Noto Sans JP', sans-serif;
}

/* ======== RESULTS ======== */
.result-hero {
  background: linear-gradient(160deg, var(--green-dark) 0%, var(--green) 55%, var(--green-light) 100%);
  padding: 56px 20px 50px; text-align: center;
  position: relative; overflow: hidden;
}
.result-hero::before {
  content: ''; position: absolute;
  top: -30px; right: -30px;
  width: 160px; height: 160px;
  background: rgba(255,255,255,0.06);
  border-radius: 50%;
}
.result-hero::after {
  content: ''; position: absolute;
  bottom: -18px; left: -5%; right: -5%;
  height: 36px; background: var(--cream);
  border-radius: 50%; z-index: 2;
}
.result-hero-label { font-size: 11px; color: rgba(255,255,255,0.7); letter-spacing: 3px; margin-bottom: 8px; }
.result-hero-title {
  font-family: 'Zen Antique Soft', serif;
  font-size: 20px; color: white; margin-bottom: 18px; line-height: 1.5;
  text-shadow: 0 2px 8px rgba(0,0,0,0.2);
}
.score-ring {
  display: inline-flex; flex-direction: column;
  align-items: center; justify-content: center;
  width: 120px; height: 120px;
  border-radius: 50%;
  background: rgba(255,255,255,0.15);
  border: 3px solid rgba(255,255,255,0.4);
  backdrop-filter: blur(10px);
  margin-bottom: 14px;
}
.score-big {
  font-family: 'Zen Antique Soft', serif;
  font-size: 42px; color: white; line-height: 1;
}
.score-denom { font-size: 13px; color: rgba(255,255,255,0.75); }
.evaluatee-name {
  font-size: 16px; color: rgba(255,255,255,0.9);
  font-weight: 500; letter-spacing: 1px;
}

/* ======== LEVEL ======== */
.level-wrap { text-align: center; padding: 4px 0 8px; }
.level-pill {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 10px 22px; border-radius: 30px;
  font-size: 15px; font-weight: 600;
  margin-bottom: 8px; border: 2px solid;
}
.lv5 { background: #fff8e1; color: #b8860b; border-color: #d4a843; } /* Outstanding */
.lv4 { background: #e8f5e9; color: #1b5e20; border-color: #4caf50; } /* Excellent */
.lv3 { background: #e3f2fd; color: #0d47a1; border-color: #1976d2; } /* Good */
.lv2 { background: #fff3e0; color: #bf360c; border-color: #f57c00; } /* Needs Improvement */
.lv1 { background: #fce4ec; color: #880e4f; border-color: #c2185b; } /* Unsatisfactory */

/* ======== BAR CHART ======== */
.bar-row { margin-bottom: 15px; }
.bar-row-head {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 6px;
}
.bar-label {
  font-size: 13px; color: var(--ink); font-weight: 500;
  display: flex; align-items: center; gap: 6px;
}
.bar-pct { font-size: 13px; font-weight: 700; color: var(--soil); }
.bar-track {
  height: 10px; background: #f0e8d4;
  border-radius: 5px; overflow: hidden;
}
.bar-fill {
  height: 100%; border-radius: 5px; width: 0%;
  transition: width 1.1s cubic-bezier(0.22, 0.61, 0.36, 1);
}

/* ======== COMMENT BLOCK ======== */
.comment-panel {
  background: linear-gradient(135deg, #fffcf2, #fff8e8);
  border-left: 5px solid var(--earth);
  border-radius: 0 14px 14px 0;
  padding: 15px 17px; margin-top: 10px;
}
.comment-panel p { font-size: 13px; line-height: 1.85; color: var(--ink); }
.comment-panel strong { color: var(--soil); }

/* ======== ADVICE ======== */
.adv-item {
  display: flex; gap: 12px; align-items: flex-start;
  padding: 13px; background: var(--paper);
  border-radius: 12px; margin-bottom: 9px;
}
.adv-icon { font-size: 22px; flex-shrink: 0; margin-top: 1px; }
.adv-body { font-size: 13px; line-height: 1.75; }
.adv-title { font-weight: 700; color: var(--green-dark); font-size: 14px; display: block; margin-bottom: 3px; }

/* ======== REPORT TABLE (like evaluation-system) ======== */
.report-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.report-table th {
  background: var(--soil); color: white;
  padding: 8px 10px; text-align: left; font-weight: 500;
}
.report-table td {
  padding: 9px 10px; border-bottom: 1px solid #f0e8d4;
  vertical-align: middle;
}
.report-table tr:last-child td { border-bottom: none; }
.report-table tr:nth-child(even) td { background: #faf6ec; }
.mini-bar { height: 6px; border-radius: 3px; background: #eee; overflow: hidden; }
.mini-bar-fill { height: 100%; border-radius: 3px; }

/* ======== EMAIL CARD ======== */
.email-card-inner { text-align: center; }
.email-note { font-size: 12px; color: var(--soil-mid); margin-bottom: 14px; }
.btn-mail {
  width: 100%; padding: 15px; border: none; border-radius: 14px;
  background: linear-gradient(135deg, var(--soil-dark), var(--soil));
  color: white; font-size: 15px; font-family: 'Noto Sans JP', sans-serif;
  cursor: pointer; letter-spacing: 1px;
  box-shadow: 0 6px 18px rgba(61,32,8,0.3);
  transition: transform 0.15s;
}
.btn-mail:active { transform: scale(0.97); }
.btn-mail:disabled { opacity: 0.6; }
.sent-notice {
  display: none; padding: 12px; background: #e8f5e9;
  border-radius: 10px; font-size: 13px; color: var(--green-dark);
}
.sent-notice.show { display: block; }

.btn-restart {
  display: block; width: calc(100% - 28px);
  margin: 10px 14px 30px; padding: 15px;
  background: transparent; border: 2px solid var(--earth);
  border-radius: 14px; color: var(--soil);
  font-size: 14px; font-family: 'Noto Sans JP', sans-serif;
  cursor: pointer; letter-spacing: 1px;
  transition: background 0.15s;
}
.btn-restart:active { background: rgba(200,132,62,0.08); }

/* ======== TOAST ======== */
.toast {
  position: fixed; bottom: 24px; left: 50%;
  transform: translateX(-50%) translateY(70px);
  background: var(--soil-dark); color: white;
  padding: 12px 22px; border-radius: 30px;
  font-size: 14px; white-space: nowrap;
  box-shadow: 0 8px 24px rgba(0,0,0,0.25);
  z-index: 999; transition: transform 0.3s ease;
}
.toast.show { transform: translateX(-50%) translateY(0); }
.mt14 { margin-top: 14px; }
.pb30 { padding-bottom: 30px; }
.lang-sw {
  position: fixed; top: 12px; right: 12px; z-index: 300;
  display: flex; gap: 5px;
}
.lang-btn {
  padding: 5px 11px;
  border: 1.5px solid rgba(255,255,255,0.5);
  border-radius: 20px;
  background: rgba(0,0,0,0.25);
  backdrop-filter: blur(6px);
  color: white; font-size: 11px;
  cursor: pointer; font-family: inherit;
  transition: all 0.2s;
}
.lang-btn.active { background: rgba(255,255,255,0.3); border-color: white; font-weight: 700; }
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<!-- ===== SCREEN: START ===== -->
<div class="screen active" id="s-start">
  <div class="himalaya">
    <div class="himalaya-snow"></div>
    <div class="himalaya-rock"></div>
    <div class="himalaya-field"></div>
    <div class="himalaya-title">
      <span class="app-icon">🥔</span>
      <h1>じゃがいもマスター</h1>
      <p>NEPAL FARMER SKILL ASSESSMENT</p>
    </div>
  </div>

  <!-- Evaluator Info -->
  <div class="card">
    <div class="card-head" id="card-eval-head">📝 評価情報の入力</div>
    <div class="evaluator-row">
      <div>
        <label class="field-label" id="lbl-name">農家名・氏名</label>
        <input class="text-input" id="inp-name" type="text" placeholder="例：Ramesh Thapa">
      </div>
      <div>
        <label class="field-label" id="lbl-village">地区・村名</label>
        <input class="text-input" id="inp-village" type="text" placeholder="例：Jumla">
      </div>
    </div>
    <div class="evaluator-row full">
      <label class="field-label" id="lbl-email">📧 メールアドレス（任意）</label>
      <input class="text-input" id="inp-email" type="email" placeholder="結果レポートをメールで受け取る場合のみ">
    </div>
    <p id="email-note" style="font-size:11px;color:var(--soil-mid);margin-top:6px;opacity:0.8;">※ メールはお使いのメールアプリから送信されます</p>
  </div>

  <!-- Category selector -->
  <div class="card mt14">
    <div class="card-head" id="cat-head">🌾 評価カテゴリ（10項目）</div>
    <div class="cat-grid" id="catGrid"></div>
  </div>

  <button class="btn-start" id="btn-start" onclick="startAssessment()">🚜 評価を開始する</button>
</div>

<!-- ===== SCREEN: QUESTION ===== -->
<div class="screen" id="s-question">
  <button class="back-btn" onclick="confirmBack()">← 戻る</button>
  <div class="q-hero" id="qHero">
    <div class="q-meta">
      <span class="q-badge" id="qBadge">🌱 土壌管理</span>
      <span class="q-counter" id="qCounter">1 / 16</span>
    </div>
    <div class="q-progress"><div class="q-progress-fill" id="qProg"></div></div>
    <div class="q-difficulty" id="qDiff">★☆☆ 基礎</div>
    <div class="q-text" id="qText">問題テキスト</div>
  </div>
  <div class="options-wrap" id="optWrap"></div>
  <div id="feedbackWrap" style="display:none;">
    <div class="feedback-box" id="fbBox"></div>
    <button class="btn-next" id="btnNext" onclick="nextQ()">次の問題へ →</button>
  </div>
</div>

<!-- ===== SCREEN: RESULTS ===== -->
<div class="screen pb30" id="s-results">
  <div class="result-hero">
    <div class="result-hero-label" id="rLabel">SKILL ASSESSMENT REPORT</div>
    <div class="result-hero-title" id="rTitle">ジャガイモ栽培<br>技術診断レポート</div>
    <div class="score-ring">
      <div class="score-big" id="rScoreBig">--</div>
      <div class="score-denom" id="rDenom">/ 100点</div>
    </div>
    <div class="evaluatee-name" id="rName"></div>
  </div>

  <!-- Level -->
  <div class="card mt14" style="text-align:center;">
    <div class="card-head" id="rOverallHead" style="justify-content:center;">🏆 総合評価レベル</div>
    <div class="level-wrap">
      <div id="levelPill"></div>
      <div id="levelSub" style="font-size:12px;color:var(--soil-mid);margin-top:4px;"></div>
    </div>
    <div class="comment-panel" id="overallComment"></div>
  </div>

  <!-- Detail table (evaluation-system style) -->
  <div class="card mt14">
    <div class="card-head" id="rCatHead">📊 カテゴリ別スコア詳細</div>
    <table class="report-table" id="reportTable">
      <tr><th>評価項目</th><th>正解</th><th>スコア</th><th>進捗</th></tr>
    </table>
  </div>

  <!-- Bar chart visual -->
  <div class="card mt14">
    <div class="card-head" id="rLevelHead">📈 技術レベル分布</div>
    <div id="barChart"></div>
  </div>

let lang = 'ja';
let currentAnswerIdx = -1;

function tl(o) {
  if (o && typeof o === 'object' && !Array.isArray(o)) return o[lang] !== undefined ? o[lang] : o.ja;
  return o;
}

function setLang(l) {
  lang = l;
  document.documentElement.lang = l === 'ja' ? 'ja' : l === 'ne' ? 'ne' : 'en';
  applyLang();
  const active = document.querySelector('.screen.active');
  if (!active) return;
  if (active.id === 's-question') rerenderQForLang();
  else if (active.id === 's-results') showResults();
}

function applyLang() {
  const u = UI[lang];
  document.querySelector('.himalaya-title h1').textContent = u.appTitle;
  document.querySelector('.himalaya-title p').textContent = u.appSub;
  document.getElementById('card-eval-head').textContent = u.evalHead;
  document.getElementById('lbl-name').textContent = u.nameLabel;
  document.getElementById('inp-name').placeholder = u.namePh;
  document.getElementById('lbl-village').textContent = u.villageLabel;
  document.getElementById('inp-village').placeholder = u.villagePh;
  document.getElementById('lbl-email').textContent = u.emailLabel;
  document.getElementById('inp-email').placeholder = u.emailPh;
  document.getElementById('email-note').textContent = u.emailNote;
  document.getElementById('cat-head').textContent = u.catHead;
  document.getElementById('btn-start').textContent = u.startBtn;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.l === lang));
  renderCatGrid();
}

function renderCatGrid() {
  const existing = document.querySelectorAll('#catGrid .cat-card');
  const currentOn = new Set([...existing].filter(e => e.classList.contains('on')).map(e => e.dataset.cat));
  const isFirst = existing.length === 0;
  const grid = document.getElementById('catGrid');
  grid.innerHTML = '';
  Object.entries(DB).forEach(([key, cat]) => {
    const isOn = isFirst || currentOn.has(key);
    const div = document.createElement('div');
    div.className = 'cat-card' + (isOn ? ' on' : '');
    div.dataset.cat = key;
    div.onclick = function() { toggleCat(this); };
    div.innerHTML = `<span class="c-icon">${cat.icon}</span><div class="c-name">${tl(cat.name)}</div><div class="c-sub">${tl(cat.sub)}</div><div class="c-chk"></div>`;
    grid.appendChild(div);
  });
}

function rerenderQForLang() {
  if (!S.allQs.length) return;
  const u = UI[lang];
  const total = S.allQs.length;
  const q = S.allQs[S.idx];
  const meta = DB[q.cat];
  document.getElementById('qBadge').textContent = meta.icon + ' ' + tl(meta.name);
  document.getElementById('qCounter').textContent = (S.idx+1) + ' / ' + total;
  document.getElementById('qDiff').textContent = q.lv===1 ? u.lv1 : q.lv===2 ? u.lv2 : u.lv3;
  document.getElementById('qText').textContent = tl(q.q);
  const opts = tl(q.opts);
  document.querySelectorAll('.opt-btn').forEach((b, i) => {
    const span = b.querySelectorAll('span')[1];
    if (span) span.textContent = opts[i];
  });
  if (S.lock && currentAnswerIdx >= 0) {
    const ok = currentAnswerIdx === q.ans;
    document.getElementById('fbBox').innerHTML = `<div class="feedback-title">${ok ? u.correct : u.wrong}</div>${tl(q.exp)}`;
    document.getElementById('btnNext').textContent = S.idx + 1 >= total ? u.lastBtn : u.nextBtn;
  }
}

// STATE
// ============================================================
let S = {
  name: '', village: '', email: '',
  selCats: [], allQs: [],
  idx: 0, answers: [], lock: false
};

// ---- toggle category ----
function toggleCat(el) { el.classList.toggle('on'); }

// ---- start ----
function startAssessment() {
  S.name    = document.getElementById('inp-name').value.trim();
  S.village = document.getElementById('inp-village').value.trim();
  S.email   = document.getElementById('inp-email').value.trim();
  S.selCats = [...document.querySelectorAll('#catGrid .cat-card.on')].map(e => e.dataset.cat);

  if (S.selCats.length === 0) { toast(UI[lang].nocat); return; }

  S.allQs = [];
  S.selCats.forEach(cat => DB[cat].qs.forEach(q => S.allQs.push({...q, cat})));
  S.allQs = S.allQs.sort(() => Math.random() - 0.5);
  S.idx = 0; S.answers = [];

  showScreen('s-question');
  renderQ();
}

// ---- render question ----
function renderQ() {
  const u = UI[lang];
  const total = S.allQs.length;
  const q = S.allQs[S.idx];
  const meta = DB[q.cat];
  const pct = (S.idx / total) * 100;

  document.getElementById('qBadge').textContent = meta.icon + ' ' + tl(meta.name);
  document.getElementById('qCounter').textContent = (S.idx+1) + ' / ' + total;
  document.getElementById('qProg').style.width = pct + '%';
  document.getElementById('qDiff').textContent = q.lv===1 ? u.lv1 : q.lv===2 ? u.lv2 : u.lv3;
  document.getElementById('qText').textContent = tl(q.q);

  const ow = document.getElementById('optWrap');
  ow.innerHTML = '';
  currentAnswerIdx = -1;
  tl(q.opts).forEach((o, i) => {
    const b = document.createElement('button');
    b.className = 'opt-btn';
    b.innerHTML = `<span class="opt-lbl">${String.fromCharCode(65+i)}</span><span>${o}</span>`;
    b.onclick = () => selectAns(i, b);
    ow.appendChild(b);
  });

  document.getElementById('feedbackWrap').style.display = 'none';
  S.lock = false;
}

// ---- select answer ----
function selectAns(idx, btn) {
  if (S.lock) return;
  S.lock = true;
  currentAnswerIdx = idx;
  const u = UI[lang];
  const q = S.allQs[S.idx];
  const ok = idx === q.ans;
  S.answers.push({ cat: q.cat, ok, idx });

  document.querySelectorAll('.opt-btn').forEach((b, i) => {
    b.onclick = null;
    if (i === q.ans) b.classList.add('correct-ans');
    else if (i === idx && !ok) b.classList.add('wrong-ans');
  });
  btn.classList.add('chosen');

  const fb = document.getElementById('fbBox');
  fb.className = 'feedback-box ' + (ok ? 'ok' : 'ng');
  fb.innerHTML = `<div class="feedback-title">${ok ? u.correct : u.wrong}</div>${tl(q.exp)}`;

  const nextBtn = document.getElementById('btnNext');
  nextBtn.textContent = S.idx + 1 >= S.allQs.length ? u.lastBtn : u.nextBtn;
  document.getElementById('feedbackWrap').style.display = 'block';
}

// ---- next ----
function nextQ() {
  S.idx++;
  if (S.idx >= S.allQs.length) showResults();
  else renderQ();
}

      marketing: {icon:'💰', t:'बिक्री रणनीति सुदृढ', b:'रेडियो वा विस्तारकर्ताबाट कटाइअघि बजार मूल्य बुझ्ने बानी बसाल्नुहोस्।'},
      learning:  {icon:'📚', t:'सिकाइ बानी बसाल्नुहोस्', b:'कृषि विस्तारकर्तासँग नियमित परामर्श र किसान समूह बैठकमा भाग लिनुहोस्।'},
    },
    en: {
      soil:      {icon:'🌱', t:'Strengthen soil management', b:'Get a pH test kit and check before each crop. Applying lime and compost improves pH and organic matter simultaneously.'},
      seed:      {icon:'🌿', t:'Review seed preparation', b:'Make buying certified seed and sprouting 2–3 weeks before planting a habit. Drying cut surfaces is also essential to prevent rot.'},
      planting:  {icon:'🪣', t:'Improve planting technique', b:'Maintaining proper depth (8–12 cm) and spacing (30×70 cm) stabilises tuber number and size.'},
      fertilizer:{icon:'💧', t:'Optimise fertiliser balance', b:'Review your potassium application rate. Keeping fertiliser records reveals deficiencies and excesses for the next crop.'},
      pest:      {icon:'🐛', t:'Early pest and disease detection', b:'Apply preventive fungicide for blight. Weekly field inspections allow early detection of aphids and blight symptoms.'},
      hilling:   {icon:'⛏️', t:'Thorough hilling and weeding', b:'Hill up 2–3 weeks after emergence to prevent greening and increase tuber numbers.'},
      harvest:   {icon:'🥔', t:'Judge the right harvest time', b:'Wait for natural die-back above ground before harvesting. Careful handling minimises bruising and rot losses.'},
      storage:   {icon:'🏚️', t:'Improve storage conditions', b:'Practice curing after harvest (15–20°C, 1–2 weeks) and store in a cool dark place.'},
      marketing: {icon:'💰', t:'Strengthen your sales strategy', b:'Make a habit of checking market prices from radio or extension workers before harvest.'},
      learning:  {icon:'📚', t:'Build a learning habit', b:'Regularly consult extension workers and attend farmer group meetings to keep improving.'},
    }
  };
  const BALANCE = {
    ja: {icon:'🎯', t:'バランスよく継続', b:'全カテゴリで良好な結果です。知識を実践に活かしながら、さらなる高得点を目指しましょう。'},
    ne: {icon:'🎯', t:'सन्तुलित रूपमा जारी राख्नुहोस्', b:'सबै श्रेणीमा राम्रो नतिजा आयो। ज्ञानलाई व्यवहारमा उतार्दै थप अंकको लागि अभ्यास जारी राख्नुहोस्।'},
    en: {icon:'🎯', t:'Keep balanced progress', b:'Good results across all categories. Keep putting knowledge into practice and aim for an even higher score.'},
  };
  const tips = TIPS[lang] || TIPS.ja;
  const weak = Object.entries(catSc)
    .filter(([c, sc]) => sc.total > 0 && (sc.ok/sc.total) < 0.7)
    .sort((a,b) => (a[1].ok/a[1].total) - (b[1].ok/b[1].total))
    .slice(0, maxN);
  if (weak.length === 0) return [BALANCE[lang] || BALANCE.ja];
  return weak.map(([cat]) => tips[cat]);
}

// ---- send mail ----
function sendMail() {
  const R = window._R;
  let catLines = '';
  S.selCats.forEach(c => {
    const sc = R.catSc[c];
    const pct = sc.total > 0 ? Math.round(sc.ok/sc.total*100) : 0;
    catLines += DB[c].icon + ' ' + tl(DB[c].name) + ': ' + pct + ' (' + sc.ok + '/' + sc.total + ')\n';
  });
  const u = UI[lang];
  const sub = encodeURIComponent(u.appTitle + ' — ' + (S.name || 'Assessment Report'));
  const body = encodeURIComponent(
`━━━━━━━━━━━━━━━━━━━━
${u.appTitle}
${S.name ? S.name : ''}${S.village ? '  '+S.village : ''}
━━━━━━━━━━━━━━━━━━━━

${R.score} / 100
${R.lvEmoji} ${R.lv}

${catLines}
━━━━━━━━━━━━━━━━━━━━`);

  document.getElementById('btnMail').disabled = true;
  setTimeout(() => {
    window.location.href = `mailto:${S.email}?subject=${sub}&body=${body}`;
    document.getElementById('sentNotice').classList.add('show');
    document.getElementById('btnMail').style.display = 'none';
    toast(UI[lang].toastMail);
  }, 500);
}

// ---- nav ----
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}
function confirmBack() {
  if (confirm(UI[lang].backConfirm)) { showScreen('s-start'); applyLang(); }
}
function restartAll() {
  S = {name:'',village:'',email:'',selCats:[],allQs:[],idx:0,answers:[],lock:false};
  ['inp-name','inp-village','inp-email'].forEach(id => document.getElementById(id).value='');
  document.getElementById('sentNotice').classList.remove('show');
  document.getElementById('btnMail').style.display='block';
  document.getElementById('btnMail').disabled=false;
  showScreen('s-start');
  applyLang();
}
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// initialise on load
applyLang();
</script>
